<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add Record - Address Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Address Book</h1>
        <nav>
            <button class = "buttons"><a href="index.html">Dashboard</a></button>
            <button class = "buttons"><a href="add.html">Add Record</a></button>
            <button class = "buttons"><a href="view.html">View Records</a></button>
            <button class = "buttons"><a href="search.html">Search Record</a></button>
            <button class = "buttons"><a href="delete.html">Delete Record</a></button>
        </nav>
    </header>

    <main>
        <h2>Add New Record</h2>
        <form action="#" method="post">
            <label>Name:</label>
            <input type="text" name="name" required>

            <label>Phone:</label>
            <input type="text" name="phone" required>

            <label>Email:</label>
            <input type="email" name="email">

            <label>Address:</label>
            <textarea name="address"></textarea>

            <button type="submit" class="btn">Submit</button>
        </form>
    </main>
</body>
</html>
